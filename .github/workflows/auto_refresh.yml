name: APiX Auto Fisher (Sharded)

on:
  schedule:
    - cron: "0 */6 * * *" # يعمل كل 6 ساعات تلقائياً
  workflow_dispatch: # زر التشغيل اليدوي

# إعطاء صلاحية الكتابة (Write) للورك فلو لكي يتمكن من حذف السجلات القديمة
permissions:
  actions: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Fisher 1 (Channels 1-5)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          COOKIE_CH1: ${{ secrets.COOKIE_CH1 }}
          COOKIE_CH2: ${{ secrets.COOKIE_CH2 }}
          COOKIE_CH3: ${{ secrets.COOKIE_CH3 }}
          COOKIE_CH4: ${{ secrets.COOKIE_CH4 }}
          COOKIE_CH5: ${{ secrets.COOKIE_CH5 }}
        run: python fisher1.py

      - name: Run Fisher 2 (Channels 6-9)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          COOKIE_CH6: ${{ secrets.COOKIE_CH6 }}
          COOKIE_CH_MOVIE_1: ${{ secrets.COOKIE_CH_MOVIE_1 }}
          COOKIE_CH_MOVIE_2: ${{ secrets.COOKIE_CH_MOVIE_2 }}
          COOKIE_CH_MOVIE_3: ${{ secrets.COOKIE_CH_MOVIE_3 }}
        run: python fisher2.py

      - name: Run Fisher 3 (Channels 10-13)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          COOKIE_CH_MOVIE_4: ${{ secrets.COOKIE_CH_MOVIE_4 }}
          COOKIE_CH_ME_MOVIE_1: ${{ secrets.COOKIE_CH_ME_MOVIE_1 }}
          COOKIE_APIX_1: ${{ secrets.COOKIE_APIX_1 }}
          COOKIE_APIX_2: ${{ secrets.COOKIE_APIX_2 }}
        run: python fisher3.py

      - name: Run Fisher 4 (Magic Channels)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          Cookies_magic_action: ${{ secrets.Cookies_magic_action }}
          Cookies_magic_carton: ${{ secrets.Cookies_magic_carton }}
          Cookies_magic_hiror: ${{ secrets.Cookies_magic_hiror }}
        run: python fisher4.py

      # --- الإجراء الأخير: تنظيف ذاكرة جيت هوب وحذف السجلات القديمة ---
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1          # مسح أي سجل مر عليه أكثر من يوم
          keep_minimum_runs: 3    # الاحتفاظ بآخر 3 عمليات تشغيل دائماً كحد أدنى احتياطياً
